<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notes App</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen">
<div class="max-w-3xl mx-auto p-5">
	<h1 class="text-3xl font-semibold mb-5 text-center">📝 Notes App</h1>
<input type="search" id="search" class="w-full p-2 border rounded mb-4" placeholder="Search Notes................">	

<div class="flex gap-2 mb-4">
	<input type="text" id="noteInput" class="flex-1 p-2 border rounded" placeholder="Write a note............">

	<button onclick="addNote()" class="bg-blue-500 text-write px-4 py-2 rounded">Add</button>
</div>

<div id="notesContainer" class="grid md:grid-cols-2 gap-4"></div>
</div>



<script src="script.js"></script>
</body>
</html>
